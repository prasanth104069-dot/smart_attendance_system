<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance System - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .alert {
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background-color: #fee;
            border: 1px solid #fcc;
            color: #c33;
        }

        .alert-success {
            background-color: #efe;
            border: 1px solid #cfc;
            color: #3c3;
        }

        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 15px;
            padding: 10px;
            background: #f5f5f5;
            border-left: 3px solid #667eea;
            border-radius: 3px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo">
                <h1>📋 Attendance System</h1>
                <h2>SKP Engineering College</h2>
            </div>

            <!-- Alert Box -->
            <div id="alertBox" class="alert"></div>

            <form id="loginForm" action="/login" method="POST" onsubmit="return validateForm()">
                <div class="form-group">
                    <label for="staff_id">Staff ID</label>
                    <input 
                        type="text" 
                        id="staff_id"
                        name="staff_id" 
                        placeholder="Enter your Staff ID"
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password"
                        name="password" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="submit-btn">Login</button>
            </form>

            <div class="info-text">
                <strong>Demo Credentials:</strong><br>
                Staff ID: <code>admin</code><br>
                Password: <code>admin123</code>
            </div>

            <div class="footer">
                <p>&copy; 2026 Smart Attendance System. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script>
        function showAlert(message, type) {
            const box = document.getElementById('alertBox');
            box.className = `alert alert-${type} show`;
            box.innerHTML = message;
            setTimeout(() => box.style.display = 'none', 5000);
        }

        function validateForm() {
            const staffId = document.getElementById('staff_id').value.trim();
            const password = document.getElementById('password').value;

            if (!staffId || !password) {
                showAlert('Please fill in all fields', 'error');
                return false;
            }

            if (staffId.length < 3) {
                showAlert('Staff ID must be at least 3 characters', 'error');
                return false;
            }

            if (password.length < 6) {
                showAlert('Password must be at least 6 characters', 'error');
                return false;
            }

            return true;
        }
