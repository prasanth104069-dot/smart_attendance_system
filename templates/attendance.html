<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .main-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Header */
        .header {
            background: white;
            padding: 20px 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left h1 {
            color: #333;
            font-size: 22px;
        }

        .header-left p {
            color: #888;
            font-size: 12px;
            margin-top: 3px;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Summary Cards */
        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            position: sticky;
            top: 10px;
            z-index: 100;

            
        }

        .summary-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .summary-card h2 {
            font-size: 32px;
            font-weight: 700;
        }

        .summary-card p {
            font-size: 13px;
            color: #888;
            margin-top: 5px;
        }

        .total h2 { color: #667eea; }
        .present h2 { color: #2ecc71; }
        .absent h2 { color: #e74c3c; }

        /* Table */
        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .table-header {
            padding: 20px 25px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .table-header h3 {
            color: #333;
            font-size: 16px;
        }

        .save-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .save-btn:hover {
            transform: translateY(-2px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f8f9ff;
        }

        thead th {
            padding: 14px 20px;
            text-align: left;
            font-size: 13px;
            color: #555;
            font-weight: 600;
            border-bottom: 2px solid #eee;
        }

        tbody tr {
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #f8f9ff;
        }

        tbody tr.present-row {
            background: #f0fff4;
        }

        tbody tr.absent-row {
            background: #fff5f5;
        }

        tbody td {
            padding: 14px 20px;
            font-size: 14px;
            color: #333;
        }

        .reg-no {
            font-family: monospace;
            color: #667eea;
            font-weight: 600;
        }

        .dept-badge {
            background: #f0f0ff;
            color: #667eea;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Attendance Buttons */
        .btn-group {
            display: flex;
            gap: 8px;
        }

        .btn-present {
            padding: 7px 16px;
            border: 2px solid #2ecc71;
            background: white;
            color: #2ecc71;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-absent {
            padding: 7px 16px;
            border: 2px solid #e74c3c;
            background: white;
            color: #e74c3c;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-present.active {
            background: #2ecc71;
            color: white;
        }

        .btn-absent.active {
            background: #e74c3c;
            color: white;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-present {
            background: #d4edda;
            color: #2ecc71;
        }

        .status-absent {
            background: #fde8e8;
            color: #e74c3c;
        }

        .status-pending {
            background: #f0f0f0;
            color: #999;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            z-index: 999;
            animation: fadeIn 0.3s ease;
        }

        .toast.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile */
        @media (max-width: 600px) {
            .summary {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .summary-card {
                padding: 15px 10px;
            }

            .summary-card h2 {
                font-size: 24px;
            }

            table thead {
                display: none;
            }

            tbody tr {
                display: block;
                padding: 15px 20px;
                border-bottom: 2px solid #f0f0f0;
            }

            tbody td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 5px 0;
                font-size: 13px;
                border: none;
            }

            tbody td::before {
                content: attr(data-label);
                font-weight: 600;
                color: #888;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">

        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1>✅ Mark Attendance</h1>
                <p id="todayDate"></p>
            </div>
            <a href="/dashboard" class="back-btn">← Back</a>
        </div>

        <!-- Summary -->
        <div class="summary">
            <div class="summary-card total">
                <h2 id="totalCount">0</h2>
                <p>Total Students</p>
            </div>
            <div class="summary-card present">
                <h2 id="presentCount">0</h2>
                <p>Present</p>
            </div>
            <div class="summary-card absent">
                <h2 id="absentCount">0</h2>
                <p>Absent</p>
            </div>
        </div>

        <!-- Table -->
        <div class="table-container">
            <div class="table-header">
                <h3>📋 Student List</h3>
                <button class="save-btn" onclick="saveAttendance()">💾 Save Attendance</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Register No</th>
                        <th>Student Name</th>
                        <th>Department</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="studentTable">
                    <!-- Students loaded by JS -->
                </tbody>
            </table>
        </div>

    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // Student Data
        const students = [
            { id: 1, regNo: 'SKP2201', name: 'Arun Kumar',     dept: 'ECE' },
            { id: 2, regNo: 'SKP2202', name: 'Priya Devi',     dept: 'ECE' },
            { id: 3, regNo: 'SKP2203', name: 'Rahul Singh',    dept: 'ECE' },
            { id: 4, regNo: 'SKP2204', name: 'Sneha Rajan',    dept: 'ECE' },
            { id: 5, regNo: 'SKP2205', name: 'Karthik M',      dept: 'ECE' },
            { id: 6, regNo: 'SKP2206', name: 'Divya S',        dept: 'ECE' },
            { id: 7, regNo: 'SKP2207', name: 'Vikram P',       dept: 'ECE' },
            { id: 8, regNo: 'SKP2208', name: 'Anitha R',       dept: 'ECE' },
        ];

        let attendance = {};

        // Load today's date
        const today = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('todayDate').textContent = today.toLocaleDateString('en-US', options);

        // Render table
        function renderTable() {
            const tbody = document.getElementById('studentTable');
            tbody.innerHTML = '';

            students.forEach((s, index) => {
                const status = attendance[s.id] || 'pending';
                const row = document.createElement('tr');

                if (status === 'present') row.className = 'present-row';
                else if (status === 'absent') row.className = 'absent-row';

                row.innerHTML = `
                    <td data-label="No">${index + 1}</td>
                    <td data-label="Reg No"><span class="reg-no">${s.regNo}</span></td>
                    <td data-label="Name">${s.name}</td>
                    <td data-label="Dept"><span class="dept-badge">${s.dept}</span></td>
                    <td data-label="Status">
                        <span class="status-badge status-${status}">
                            ${status === 'present' ? '✅ Present' : status === 'absent' ? '❌ Absent' : '⏳ Pending'}
                        </span>
                    </td>
                    <td data-label="Action">
                        <div class="btn-group">
                            <button class="btn-present ${status === 'present' ? 'active' : ''}"
                                onclick="markAttendance(${s.id}, 'present')">Present</button>
                            <button class="btn-absent ${status === 'absent' ? 'active' : ''}"
                                onclick="markAttendance(${s.id}, 'absent')">Absent</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });

            updateCounts();
        }

        // Mark attendance
        function markAttendance(id, status) {
            attendance[id] = status;
            renderTable();
        }

        // Update counts
        function updateCounts() {
            const presentCount = Object.values(attendance).filter(v => v === 'present').length;
            const absentCount = Object.values(attendance).filter(v => v === 'absent').length;

            document.getElementById('totalCount').textContent = students.length;
            document.getElementById('presentCount').textContent = presentCount;
            document.getElementById('absentCount').textContent = absentCount;
        }

        // Save attendance
        function saveAttendance() {
            const pending = students.filter(s => !attendance[s.id]);
            if (pending.length > 0) {
                showToast(`⚠️ ${pending.length} students not marked yet!`);
                return;
            }

            // Save to localStorage and go to report
    const reportData = students.map(s => ({
        regNo: s.regNo,
        name: s.name,
        dept: s.dept,
        status: attendance[s.id]
    }));

    localStorage.setItem('attendanceReport', JSON.stringify(reportData));
    window.location.href = '/view-reports';
            
            showToast('✅ Attendance saved successfully!');
        }

        // Toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Init
        renderTable();
    </script>
</body>
</html>
