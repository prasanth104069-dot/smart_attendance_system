<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .main-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Header */
        .header {
            background: white;
            padding: 20px 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left h1 {
            color: #333;
            font-size: 20px;
        }

        .header-left p {
            color: #888;
            font-size: 12px;
            margin-top: 3px;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        /* Sticky Summary */
        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .summary-card {
            background: white;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .summary-card h2 {
            font-size: 28px;
            font-weight: 700;
        }

        .summary-card p {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .total h2   { color: #667eea; }
        .present h2 { color: #2ecc71; }
        .absent h2  { color: #e74c3c; }

        /* Table */
        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .table-header {
            padding: 18px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .table-header h3 {
            color: #333;
            font-size: 15px;
        }

        .save-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .save-btn:hover {
            transform: translateY(-2px);
        }

        .save-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }

        thead {
            background: #f8f9ff;
        }

        thead th {
            padding: 12px 15px;
            text-align: left;
            font-size: 12px;
            color: #555;
            font-weight: 600;
            border-bottom: 2px solid #eee;
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid #f5f5f5;
            transition: background 0.2s;
        }

        tbody tr.present-row { background: #f0fff4; }
        tbody tr.absent-row  { background: #fff5f5; }

        tbody td {
            padding: 12px 15px;
            font-size: 13px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .reg-no {
            font-family: monospace;
            color: #667eea;
            font-weight: 600;
        }

        .dept-badge {
            background: #f0f0ff;
            color: #667eea;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 6px;
        }

        .btn-present {
            padding: 6px 12px;
            border: 2px solid #2ecc71;
            background: white;
            color: #2ecc71;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-absent {
            padding: 6px 12px;
            border: 2px solid #e74c3c;
            background: white;
            color: #e74c3c;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-present.active {
            background: #2ecc71;
            color: white;
        }

        .btn-absent.active {
            background: #e74c3c;
            color: white;
        }

        .status-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-present { background: #d4edda; color: #2ecc71; }
        .status-absent  { background: #fde8e8; color: #e74c3c; }
        .status-pending { background: #f0f0f0; color: #999;    }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 14px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            z-index: 999;
        }

        .toast.show { display: block; }

        /* Mobile */
        @media (max-width: 500px) {
            .summary-card h2 { font-size: 22px; }
            .summary-card p  { font-size: 10px; }
            .header-left h1  { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="main-container">

        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1>✅ Mark Attendance</h1>
                <p id="todayDate"></p>
            </div>
            <a href="/dashboard" class="back-btn">← Back</a>
        </div>

        <!-- Sticky Summary -->
        <div class="summary">
            <div class="summary-card total">
                <h2 id="totalCount">0</h2>
                <p>Total</p>
            </div>
            <div class="summary-card present">
                <h2 id="presentCount">0</h2>
                <p>Present</p>
            </div>
            <div class="summary-card absent">
                <h2 id="absentCount">0</h2>
                <p>Absent</p>
            </div>
        </div>

        <!-- Table -->
        <div class="table-container">
            <div class="table-header">
                <h3>📋 Student List</h3>
                <button class="save-btn" id="saveBtn"
                        onclick="saveAttendance()">
                    💾 Save Attendance
                </button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Reg No</th>
                            <th>Name</th>
                            <th>Dept</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="studentTable">
                        <tr>
                            <td colspan="6" class="loading">
                                ⏳ Loading students...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const attendance = {};
        let totalStudentsCount = 0;

        // Show today's date
        const today = new Date();
        const options = {
            weekday: 'long', year: 'numeric',
            month: 'long', day: 'numeric'
        };
        document.getElementById('todayDate').textContent =
            today.toLocaleDateString('en-US', options);

        // Load students from API
        async function loadStudents() {
            try {
                const res = await fetch('/api/students');
                const students = await res.json();

                totalStudentsCount = students.length;
                document.getElementById('totalCount').textContent =
                    students.length;

                const tbody = document.getElementById('studentTable');
                tbody.innerHTML = '';

                students.forEach((s, index) => {
                    const row = document.createElement('tr');
                    row.id = 'row-' + s.id;
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td><span class="reg-no">${s.reg_no}</span></td>
                        <td title="${s.name}">${s.name}</td>
                        <td>
                            <span class="dept-badge">${s.dept}</span>
                        </td>
                        <td>
                            <span class="status-badge status-pending"
                                  id="status-${s.id}">
                                ⏳ Pending
                            </span>
                        </td>
                        <td>
                            <div class="btn-group">
                                <button class="btn-present"
                                    id="p-${s.id}"
                                    onclick="markAttendance(
                                        ${s.id}, 'present')">
                                    Present
                                </button>
                                <button class="btn-absent"
                                    id="a-${s.id}"
                                    onclick="markAttendance(
                                        ${s.id}, 'absent')">
                                    Absent
                                </button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

            } catch (err) {
                document.getElementById('studentTable').innerHTML =
                    '<tr><td colspan="6" class="loading">❌ Failed to load students!</td></tr>';
            }
        }

        // Mark attendance
        function markAttendance(id, status) {
            attendance[id] = status;

            // Row color
            const row = document.getElementById('row-' + id);
            row.className = status === 'present' ?
                'present-row' : 'absent-row';

            // Status badge
            const badge = document.getElementById('status-' + id);
            badge.className = 'status-badge status-' + status;
            badge.textContent = status === 'present' ?
                '✅ Present' : '❌ Absent';

            // Buttons
            document.getElementById('p-' + id).className =
                'btn-present' + (status === 'present' ? ' active' : '');
            document.getElementById('a-' + id).className =
                'btn-absent' + (status === 'absent' ? ' active' : '');

            updateCounts();
        }

        // Update counts
        function updateCounts() {
            const presentCount = Object.values(attendance)
                .filter(v => v === 'present').length;
            const absentCount = Object.values(attendance)
                .filter(v => v === 'absent').length;

            document.getElementById('presentCount').textContent =
                presentCount;
            document.getElementById('absentCount').textContent =
                absentCount;
        }

        // Save attendance to database
        async function saveAttendance() {
            const marked = Object.keys(attendance).length;
            const pending = totalStudentsCount - marked;

            if (pending > 0) {
                showToast(`⚠️ ${pending} students not marked yet!`);
                return;
            }

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = '⏳ Saving...';

            const payload = Object.entries(attendance).map(
                ([id, status]) => ({
                    student_id: parseInt(id),
                    status: status
                })
            );

            try {
                const res = await fetch('/save-attendance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await res.json();

                if (result.success) {
                    showToast('✅ Saved to database!');
                    setTimeout(() => {
                        window.location.href = '/view-reports';
                    }, 1500);
                } else {
                    showToast('❌ Error saving!');
                    saveBtn.disabled = false;
                    saveBtn.textContent = '💾 Save Attendance';
                }
            } catch (err) {
                showToast('❌ Network error!');
                saveBtn.disabled = false;
                saveBtn.textContent = '💾 Save Attendance';
            }
        }

        // Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Init
        loadStudents();
    </script>
</body>
</html>
