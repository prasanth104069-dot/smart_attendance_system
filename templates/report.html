<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Report</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .main-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Header */
        .header {
            background: white;
            padding: 20px 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left h1 {
            color: #333;
            font-size: 20px;
        }

        .header-left p {
            color: #888;
            font-size: 12px;
            margin-top: 3px;
        }

        .back-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        /* Summary */
        .summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .summary-card {
            background: white;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .summary-card h2 {
            font-size: 28px;
            font-weight: 700;
        }

        .summary-card p {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .total h2   { color: #667eea; }
        .present h2 { color: #2ecc71; }
        .absent h2  { color: #e74c3c; }

        /* Table */
        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .table-header {
            padding: 18px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .table-header h3 {
            color: #333;
            font-size: 15px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .excel-btn {
            background: linear-gradient(135deg, #1d6f42, #2ecc71);
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            white-space: nowrap;
        }

        .excel-btn:hover {
            transform: translateY(-2px);
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }

        thead {
            background: #f8f9ff;
        }

        thead th {
            padding: 12px 15px;
            text-align: left;
            font-size: 12px;
            color: #555;
            font-weight: 600;
            border-bottom: 2px solid #eee;
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid #f5f5f5;
        }

        tbody tr.present-row { background: #f0fff4; }
        tbody tr.absent-row  { background: #fff5f5; }

        tbody td {
            padding: 12px 15px;
            font-size: 13px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .reg-no {
            font-family: monospace;
            color: #667eea;
            font-weight: 600;
        }

        .dept-badge {
            background: #f0f0ff;
            color: #667eea;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-present { background: #d4edda; color: #2ecc71; }
        .status-absent  { background: #fde8e8; color: #e74c3c; }

        /* State */
        .state-box {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .state-box .icon { font-size: 40px; margin-bottom: 10px; }
        .state-box p { font-size: 14px; }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #f0f0f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Mobile */
        @media (max-width: 500px) {
            .summary-card h2 { font-size: 22px; }
            .summary-card p  { font-size: 10px; }
            .header-left h1  { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="main-container">

        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1>📊 Attendance Report</h1>
                <p id="reportDate"></p>
            </div>
            <a href="/dashboard" class="back-btn">← Back</a>
        </div>

        <!-- Summary -->
        <div class="summary">
            <div class="summary-card total">
                <h2 id="totalCount">0</h2>
                <p>Total</p>
            </div>
            <div class="summary-card present">
                <h2 id="presentCount">0</h2>
                <p>Present</p>
            </div>
            <div class="summary-card absent">
                <h2 id="absentCount">0</h2>
                <p>Absent</p>
            </div>
        </div>

        <!-- Table -->
        <div class="table-container">
            <div class="table-header">
                <h3>📋 Today's Report</h3>
                <div class="btn-group">
                    <button class="excel-btn" onclick="exportToExcel()">
                        📥 Download Excel
                    </button>
                </div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Reg No</th>
                            <th>Name</th>
                            <th>Dept</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="reportBody">
                        <tr>
                            <td colspan="6">
                                <div class="state-box">
                                    <div class="spinner"></div>
                                    <p>Loading report...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        let reportData = [];

        // Today's date
        const today = new Date();
        const options = {
            weekday: 'long', year: 'numeric',
            month: 'long', day: 'numeric'
        };
        const dateStr = today.toLocaleDateString('en-US', options);
        document.getElementById('reportDate').textContent = dateStr;

        // Load report from API
        async function loadReport() {
            try {
                const todayISO = today.toISOString().split('T')[0];
                const res = await fetch(`/api/report?date=${todayISO}`);
                const data = await res.json();
                reportData = data;
                renderReport(data);
            } catch (err) {
                document.getElementById('reportBody').innerHTML = `
                    <tr>
                        <td colspan="6">
                            <div class="state-box">
                                <div class="icon">❌</div>
                                <p>Error loading report!</p>
                            </div>
                        </td>
                    </tr>`;
            }
        }

        // Render report
        function renderReport(data) {
            const tbody = document.getElementById('reportBody');

            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6">
                            <div class="state-box">
                                <div class="icon">📭</div>
                                <p>No attendance marked for today yet.</p>
                            </div>
                        </td>
                    </tr>`;
                return;
            }

            let presentCount = 0;
            let absentCount = 0;
            tbody.innerHTML = '';

            data.forEach((r, index) => {
                if (r.status === 'present') presentCount++;
                else absentCount++;

                const row = document.createElement('tr');
                row.className = r.status === 'present' ?
                    'present-row' : 'absent-row';

                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td><span class="reg-no">${r.reg_no}</span></td>
                    <td title="${r.name}">${r.name}</td>
                    <td><span class="dept-badge">${r.dept}</span></td>
                    <td>
                        <span class="status-badge status-${r.status}">
                            ${r.status === 'present' ?
                                '✅ Present' : '❌ Absent'}
                        </span>
                    </td>
                    <td>${r.date}</td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('totalCount').textContent = data.length;
            document.getElementById('presentCount').textContent = presentCount;
            document.getElementById('absentCount').textContent = absentCount;
        }

        // Export to Excel
        function exportToExcel() {
            if (reportData.length === 0) {
                alert('No data to export!');
                return;
            }

            const excelData = reportData.map((r, index) => ({
                'S.No':         index + 1,
                'Register No':  r.reg_no,
                'Student Name': r.name,
                'Department':   r.dept,
                'Status':       r.status === 'present' ? 'Present' : 'Absent',
                'Date':         r.date
            }));

            const ws = XLSX.utils.json_to_sheet(excelData);

            ws['!cols'] = [
                { wch: 6  },
                { wch: 12 },
                { wch: 20 },
                { wch: 10 },
                { wch: 10 },
                { wch: 15 }
            ];

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Attendance');

            const fileName = `Attendance_${today.toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(wb, fileName);
        }

        // Init
        loadReport();
    </script>
</body>
</html>
